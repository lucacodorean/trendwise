services:
  backend:
    build:
      context: ./backend
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  backend-tests:
    build:
      context: ./backend
    profiles:
      - tools
    env_file: .env.example
    working_dir: /workspace/backend
    command: python -m pytest -v
    volumes:
      - .:/workspace
    depends_on:
      - postgres
      - redis

  seed-db:
    build:
      context: ./backend
    profiles:
      - tools
    env_file: .env.example
    command: python -m app.database.seed
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trendwise
      POSTGRES_USER: trendwise
      POSTGRES_PASSWORD: trendwise
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: ./backend
    env_file: .env.example
    command: celery -A app.worker.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: ./backend
    env_file: .env.example
    command: celery -A app.worker.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis

  mobile:
    build:
      context: ./mobile
    command: npm start -- --host lan
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "8081:8081"
    volumes:
      - ./mobile:/app
      - mobile-node-modules:/app/node_modules

  mobile-typecheck:
    build:
      context: ./mobile
    profiles:
      - tools
    command: npm run typecheck
    volumes:
      - ./mobile:/app
      - mobile-node-modules:/app/node_modules

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    ports:
      - "16686:16686"
      - "14250:14250"

volumes:
  postgres-data:
  mobile-node-modules:
